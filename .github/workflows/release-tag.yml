name: Release on Tag

on:
  push:
    tags:
      - 'v*.*.*'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Full history is needed so changeset can read prior tags
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Set all fixed-group package versions to exactly match the git tag (e.g. v0.9.12 → 0.9.12).
      # This replaces the old auto-changeset + `changeset version` approach which only applied
      # a patch bump (+1) from the current version and could publish the wrong version number.
      - name: Set exact version from tag
        shell: bash
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting fixed-group packages to version: $TAG_VERSION"
          node - <<'SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const tagVersion = process.env.TAG_VERSION;
          if (!tagVersion) { console.error('TAG_VERSION environment variable is not set. This value is derived from GITHUB_REF_NAME and should be automatically available in the workflow context.'); process.exit(1); }
          const config = JSON.parse(fs.readFileSync('.changeset/config.json', 'utf8'));
          const fixedPkgs = new Set((config.fixed || []).flat());
          ['packages', 'apps'].forEach(dir => {
            if (!fs.existsSync(dir)) return;
            fs.readdirSync(dir).forEach(subdir => {
              const pkgPath = path.join(dir, subdir, 'package.json');
              if (!fs.existsSync(pkgPath)) return;
              try {
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (fixedPkgs.has(pkg.name)) {
                  console.log(`  ${pkg.name}: ${pkg.version} -> ${tagVersion}`);
                  pkg.version = tagVersion;
                  fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                }
              } catch (err) { console.warn(`Skipping ${pkgPath}: ${err.message}`); }
            });
          });
          SCRIPT

      # Remove any leftover changeset files so they are not carried into the Version PR.
      - name: Clean up pending changesets
        shell: bash
        run: |
          if [ -d .changeset ]; then
            find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -delete
            echo "Cleaned up pending changeset files"
          fi

      # Publish only the fixed set of packages to npm.
      # Per-package npm tags (e.g. @bunny-agent/sdk@x.y.z) are not created here;
      # the pushed v*.*.* git tag serves as the release marker.
      # set -e ensures the step fails immediately if any publish command fails.
      - name: Publish to npm
        run: |
          set -e
          pnpm --filter @bunny-agent/sdk publish --access public --no-git-checks
          pnpm --filter @bunny-agent/manager publish --access public --no-git-checks
          pnpm --filter @bunny-agent/sandbox-sandock publish --access public --no-git-checks
          pnpm --filter @bunny-agent/runner-cli publish --access public --no-git-checks
          pnpm --filter @bunny-agent/daemon publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_PUBLISH_TOKEN }}

      # Open a PR that carries the version-bump commits back into main so that
      # package.json files and CHANGELOGs stay in sync with what was published.
      - name: Create Version PR
        id: create_version_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "chore: version packages (${{ github.ref_name }})"
          title: "chore: Version Packages (${{ github.ref_name }})"
          body: |
            ## Version Packages — ${{ github.ref_name }}

            This PR was automatically created by the **Release on Tag** workflow.

            It contains the `package.json` version bumps
            that were applied and published to npm when tag `${{ github.ref_name }}` was pushed.

            Please review and merge to keep the repository in sync.
          branch: changeset-release/main
          base: main
          delete-branch: true

      - name: Warn when Version PR creation is blocked
        if: steps.create_version_pr.outcome == 'failure'
        run: |
          echo "::warning::Version PR creation failed. Publishing succeeded, but the token used lacks pull request creation rights. Add a repository secret named GH_PAT (fine-grained PAT with 'Contents: write' and 'Pull requests: write' for this repo) to enable automatic Version PRs."

      # Enable auto-merge so the Version PR merges itself once CI passes.
      # Requires: (1) GH_PAT secret with pull-requests:write, (2) auto-merge enabled
      # in the repository settings (Settings → General → Allow auto-merge).
      - name: Enable auto-merge on Version PR
        id: enable_automerge
        if: steps.create_version_pr.outcome == 'success' && steps.create_version_pr.outputs.pull-request-number != ''
        continue-on-error: true
        run: |
          gh pr merge "${{ steps.create_version_pr.outputs.pull-request-number }}" \
            --auto --squash \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Warn when auto-merge could not be enabled
        if: steps.enable_automerge.outcome == 'failure'
        run: |
          echo "::warning::Auto-merge could not be enabled on the Version PR. Either the GH_PAT secret is missing / lacks permissions, or auto-merge is not enabled for this repository (Settings → General → Allow auto-merge). The PR was still created and can be merged manually."
