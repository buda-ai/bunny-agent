name: Publish @sandagent/runner-cli to NPM

on:
  push:
    branches:
      - main
      - chore*
  workflow_dispatch:  # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @sandagent/runner-claude build

      - name: Run tests
        run: |
          pnpm --filter @sandagent/runner-cli test
          pnpm --filter @sandagent/runner-claude test

      - name: Build
        run: pnpm --filter @sandagent/runner-cli build

      - name: Type check
        run: |
          pnpm --filter @sandagent/runner-cli typecheck
          pnpm --filter @sandagent/runner-claude typecheck

      - name: Publish to NPM
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: ./apps/runner-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}