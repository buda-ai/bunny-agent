name: Publish Selected Packages to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --filter @sandagent/runner-claude build
          pnpm --filter @sandagent/runner-codex build
          pnpm --filter @sandagent/runner-gemini build
          pnpm --filter @sandagent/runner-opencode build
          pnpm --filter @sandagent/runner-pi build

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_PUBLISH_TOKEN }}

      - name: Publish selected packages
        shell: bash
        run: |
          set -euo pipefail

          publish_if_needed() {
            local package_name="$1"
            local package_dir="$2"

            local local_version
            local_version="$(node -p "require('./${package_dir}/package.json').version")"

            echo "Checking ${package_name}@${local_version}"
            if npm view "${package_name}@${local_version}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${local_version} (already published)"
              return
            fi

            echo "Building ${package_name} and workspace dependencies"
            pnpm -r --filter "${package_name}..." build

            echo "Publishing ${package_name}@${local_version}"
            pnpm publish --access public --no-git-checks --dir "${package_dir}"
          }

          publish_if_needed "@sandagent/sdk" "packages/sdk"
          publish_if_needed "@sandagent/manager" "packages/manager"
          publish_if_needed "@sandagent/sandbox-sandock" "packages/sandbox-sandock"
          publish_if_needed "@sandagent/runner-cli" "apps/runner-cli"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_PUBLISH_TOKEN }}
