# =============================================================================
# Deploy SandAgent Web to Vercel
# =============================================================================
#
# Deploys apps/web (docs + example) to https://sandagent.vercel.com
#
# Architecture:
#   Browser -> Vercel (Next.js) -> E2B/Sandock Sandbox -> runner-cli -> Claude Agent SDK
#
# Required Secrets:
#   - VERCEL_TOKEN: Vercel deployment token
#   - VERCEL_ORG_ID: Vercel organization ID
#   - VERCEL_PROJECT_ID: Vercel project ID
#
# Client Configuration (Settings page):
#   - ANTHROPIC_API_KEY: Claude API key
#   - E2B_API_KEY: E2B sandbox API key
#   - SANDOCK_API_KEY: Sandock sandbox API key
#
# =============================================================================

name: Deploy SandAgent Web to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Build runner-cli bundle
        run: pnpm --filter @sandagent/runner-cli build:bundle

      - name: Verify runner bundle
        run: |
          if [ ! -f "apps/runner-cli/dist/bundle.mjs" ]; then
            echo "❌ Error: bundle.mjs not found"
            exit 1
          fi
          echo "✅ bundle.mjs: $(du -h apps/runner-cli/dist/bundle.mjs | cut -f1)"

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information (Preview)
        if: github.ref == 'refs/heads/develop'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Information (Production)
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project with Vercel (Preview)
        if: github.ref == 'refs/heads/develop'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project with Vercel (Production)
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        if: github.ref == 'refs/heads/develop'
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview URL: $url"

      - name: Deploy Production to Vercel
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
