name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm run -w lint

      - name: Test
        run: pnpm test

      - name: Coverage
        run: |
          pnpm --filter @bunny-agent/runner-pi exec vitest run --coverage
          pnpm --filter @bunny-agent/daemon exec vitest run --coverage

      - name: AI integration coverage
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          RUN_AI_INTEGRATION: "1"
          BUNNY_AI_INTEGRATION_PI_MODEL: openai:gpt-5.4
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          pnpm --filter @bunny-agent/runner-pi exec vitest run --coverage
          pnpm --filter @bunny-agent/daemon exec vitest run --coverage
