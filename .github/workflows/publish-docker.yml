name: Publish Docker Image

on:
  workflow_run:
    workflows:
      - "Release on Tag"
    types:
      - completed

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Only run when the Release workflow succeeded AND was triggered by a semver tag (v*.*.*)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Check out the exact version tag. The job-level 'if' already
          # ensures head_branch is a v*.*.* tag (trusted maintainer ref).
          ref: refs/tags/${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Use the head_branch from the triggering workflow_run event as the primary
          # source of truth (it is the git tag that triggered "Release on Tag").
          TAG="${{ github.event.workflow_run.head_branch }}"

          # Cross-check: if a semver tag points at HEAD, prefer that (handles edge
          # cases where head_branch contains unexpected values).
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]' | sort -V | tail -1)
          if [ -n "${GIT_TAG}" ]; then
            TAG="${GIT_TAG}"
          fi

          # Strip the leading 'v' prefix (e.g. v1.2.3 → 1.2.3)
          VERSION="${TAG#v}"

          # Validate: version must be a non-empty semver string (X.Y.Z[...]).
          # If it is empty or malformed the build would silently push only the
          # "latest" tag with an invalid/empty version tag – fail loudly instead.
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]'; then
            echo "::error::Could not determine a valid semver version from tag '${TAG}'." \
              "Expected format: v<MAJOR>.<MINOR>.<PATCH>. Aborting to prevent pushing" \
              "an untagged image."
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION} (from tag: ${TAG})"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/sandagent-claude
          file: ./docker/sandagent-claude/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            RUNNER_CLI_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/vikadata/sandagent:${{ steps.version.outputs.version }}
            ghcr.io/vikadata/sandagent:latest
